# ================================================================
# Spark 설정 - Standalone 모드
# VDES 빅데이터 플랫폼 (Lambda Architecture)
# ================================================================

# ─── Spark Master (Standalone) ───────────────────────────────────
spark.master                              spark://spark-master:7077

# ─── HDFS 연동 (Data Lake) ───────────────────────────────────────
spark.hadoop.fs.defaultFS                 hdfs://namenode:9000

# ─── Kafka 연동 안내 ─────────────────────────────────────────────
# spark.kafka.* 는 Spark 공식 설정키가 아닙니다.
# Kafka 연결은 잡 코드 또는 spark-submit 실행 시 직접 지정하세요.
#
# [Batch 잡 실행 예시]
#   docker exec spark-master /opt/spark/bin/spark-submit \
#     --master spark://spark-master:7077 \
#     --total-executor-cores 2 \
#     --executor-memory 1G \
#     --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0 \
#     /your/job/batch_job.py
#
# [Streaming 잡 실행 예시]
#   docker exec spark-master /opt/spark/bin/spark-submit \
#     --master spark://spark-master:7077 \
#     --total-executor-cores 2 \
#     --executor-memory 512m \
#     --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0 \
#     /your/job/streaming_job.py
#
# [코드 내 Kafka 연결 예시 (Streaming)]
#   df = spark.readStream.format("kafka") \
#       .option("kafka.bootstrap.servers", "host.docker.internal:9092") \
#       .option("subscribe", "ais,asm,vde,vsi") \
#       .load()
#
# [코드 내 Kafka 연결 예시 (Batch)]
#   df = spark.read.format("kafka") \
#       .option("kafka.bootstrap.servers", "host.docker.internal:9092") \
#       .option("subscribe", "ais") \
#       .load()

# ─── History Server ──────────────────────────────────────────────
spark.eventLog.enabled                    true
spark.eventLog.dir                        hdfs://namenode:9000/spark-logs
spark.history.fs.logDirectory             hdfs://namenode:9000/spark-logs

# ─── 기본 Executor 리소스 설정 ───────────────────────────────────
# spark-submit 실행 시 --executor-memory, --executor-cores 로 재정의 가능
spark.executor.memory                     1g
spark.executor.cores                      1
spark.driver.memory                       1g

# ─── Batch Layer 설정 ────────────────────────────────────────────
# spark-submit 시 아래 옵션 추가 권장
# --total-executor-cores 2   (Worker 1의 코어만 사용)
# --executor-memory 1G

# ─── Speed Layer (Structured Streaming) 설정 ─────────────────────
# Streaming 잡이 비정상 종료되면 체크포인트에서 자동 재시작
spark.streaming.stopGracefullyOnShutdown  true
spark.sql.streaming.checkpointLocation    hdfs://namenode:9000/spark-checkpoints

# ─── 직렬화 / SQL 최적화 ─────────────────────────────────────────
spark.serializer                          org.apache.spark.serializer.KryoSerializer
spark.sql.adaptive.enabled                true
spark.sql.shuffle.partitions              10
